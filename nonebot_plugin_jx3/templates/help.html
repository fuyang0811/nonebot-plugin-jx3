<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #e0e0e0;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .main-title {
    font-size: 24px;
    font-weight: bold;
    color: #d4af37;
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(212,175,55,0.3);
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 16px;
    font-weight: bold;
    color: #c0a030;
    margin: 16px 0 8px 0;
    padding-left: 8px;
    border-left: 3px solid #d4af37;
  }
  .cmd-row {
    display: flex;
    padding: 5px 0;
    font-size: 13px;
  }
  .cmd-name {
    color: #90caf9;
    min-width: 180px;
    font-family: monospace;
    font-size: 13px;
  }
  .cmd-desc {
    color: rgba(255,255,255,0.65);
    font-size: 13px;
  }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    margin-top: 12px;
  }
  .divider {
    height: 1px;
    background: rgba(212,175,55,0.15);
    margin: 6px 0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="main-title">⚔️ 剑网三助手 · 指令帮助</div>
    {% for section, commands in data.items() %}
    <div class="section-title">{{ section }}</div>
    {% for cmd, desc in commands %}
    <div class="cmd-row">
      <span class="cmd-name">{{ cmd }}</span>
      <span class="cmd-desc">{{ desc }}</span>
    </div>
    {% endfor %}
    {% if not loop.last %}<div class="divider"></div>{% endif %}
    {% endfor %}
  </div>
  <div class="footer">{{ bot_name }} · JX3API · {{ timestamp }}</div>
</body>
</html>
