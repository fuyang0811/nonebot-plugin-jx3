<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #e0e0e0;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .title {
    font-size: 22px;
    font-weight: bold;
    color: #d4af37;
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(212,175,55,0.3);
    margin-bottom: 16px;
  }
  .info-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    padding: 0 10px;
  }
  .matrix-item {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 3px solid rgba(212,175,55,0.6);
  }
  .matrix-item:last-child { margin-bottom: 0; }
  .m-title {
    font-size: 14px;
    font-weight: bold;
    color: #ffd54f;
    margin-bottom: 4px;
  }
  .m-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    margin-top: 12px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">{{ title }}</div>
    
    <div class="info-header">
      <span style="color:#d4af37; font-weight:bold;">{{ data.name }}</span>
      <span style="color:#90caf9;">{{ data.skillName }}</span>
    </div>

    {% if data.data is defined and data.data | length > 0 %}
      {% for item in data.data %}
      <div class="matrix-item">
        <div class="m-title">{{ item.level }}重 · {{ item.name }}</div>
        <div class="m-desc">{{ item.desc }}</div>
      </div>
      {% endfor %}
    {% else %}
      <div style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">暂无阵眼数据</div>
    {% endif %}
  </div>
  <div class="footer">{{ bot_name }} · JX3API · {{ timestamp }}</div>
</body>
</html>
